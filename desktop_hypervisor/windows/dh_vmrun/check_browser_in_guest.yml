---
# Description:
# This test to check a browser can be opened in Guest VM.
#
- name: check_browser_in_guest
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "Test case block"
      block:
        - name: "Test setup"
          include_tasks: ../../common/dh_test_setup.yml
          vars:
            create_dh_test_folder: true
            require_dh_vm_exists: "{{ true if (dh_new_vm is undefined or not dh_new_vm | bool) else false }}"

        - name: "Execute Firefox URL Check"
          ansible.builtin.include_tasks: check_firefox_installer.yml

        - name: "Proceed with installation if check passed"
          ansible.builtin.debug:
            msg: "The installer is accessible at {{ firefox_url }}. Proceeding..."
          when:
            - final_check.status is defined
            - final_check.status == 200

        #- name: "Skip test case"
        #  when:
        #    - firefox_download_url is undefined or not firefox_download_url | regex_search('\.exe$')
        #  include_tasks: ../../../common/skip_test_case.yml
        #  vars:
        #    skip_msg: "Skip test case due to firefox_download_url is undefined or does not end with .exe"
        #    skip_reason: "Skipped"

        - name: "Make sure Guest VM is exists"
          when: dh_new_vm is defined and dh_new_vm | bool
          ansible.builtin.assert:
            that:
              - dh_vm_exists
              - dh_vm_vmx_exists
            fail_msg: "VM with path '{{ dh_vm_vmx_path }}' is not exists, please deploy vm first."

        - name: "Run check browser test in Guest"
          when: host_machine_type == "windows"
          include_tasks: browser_test.yml
      rescue:
        - name: "Test case failure"
          include_tasks: ../../common/dh_test_rescue.yml
          vars:
            exit_testing_when_fail: true
